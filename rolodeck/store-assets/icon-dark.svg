<svg width="1024" height="1024" viewBox="0 0 120 120"
     fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Rustic Trade dark icon — dark brown background, burnt-orange clipboard -->

  <!-- Background -->
  <rect width="120" height="120" fill="#2A1506"/>

  <!-- Subtle warm highlight top-left -->
  <rect width="120" height="120" fill="url(#bgShineDark)"/>

  <!-- Clipboard body -->
  <rect x="17" y="30" width="86" height="82" rx="10" fill="#C8853A"/>

  <!-- Clipboard body highlight (top edge shimmer) -->
  <rect x="17" y="30" width="86" height="14" rx="10" fill="white" opacity="0.10"/>

  <!-- Clip assembly -->
  <rect x="38" y="18" width="44" height="25" rx="13" fill="#8B4513"/>
  <!-- Clip hole -->
  <rect x="46" y="22" width="28" height="16" rx="8" fill="#2A1506"/>

  <!-- Ruled lines on clipboard -->
  <rect x="26" y="52" width="68" height="6"  rx="3" fill="white" opacity="0.52"/>
  <rect x="26" y="64" width="50" height="6"  rx="3" fill="white" opacity="0.34"/>
  <rect x="26" y="76" width="62" height="6"  rx="3" fill="white" opacity="0.52"/>
  <rect x="26" y="88" width="36" height="6"  rx="3" fill="white" opacity="0.34"/>

  <!-- Cream accent dot -->
  <circle cx="89" cy="94" r="13" fill="#EDD9C0"/>
  <!-- Dot highlight -->
  <circle cx="85" cy="90" r="4"  fill="white" opacity="0.40"/>

  <defs>
    <linearGradient id="bgShineDark" x1="0" y1="0" x2="120" y2="120"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="white"   stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#6B2E0E" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
</svg>
